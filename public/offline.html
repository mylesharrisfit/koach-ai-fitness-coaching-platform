<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOACH AI — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #F8F9FA;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 { font-size: 22px; font-weight: 800; color: #0F172A; margin-bottom: 8px; }
    p { font-size: 15px; color: #64748B; line-height: 1.6; max-width: 280px; margin: 0 auto 32px; }
    button {
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      max-width: 280px;
    }
    .note { margin-top: 20px; font-size: 13px; color: #94A3B8; }
  </style>
</head>
<body>
  <div class="logo">💪</div>
  <h1>You're offline</h1>
  <p>Check your internet connection. Your recent data is saved and will sync when you're back online.</p>
  <button onclick="window.location.reload()">Retry Connection</button>
  <p class="note">Any workouts or logs you save offline will sync automatically</p>
</body>
</html>
